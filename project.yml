name: FrogR

options:
  bundleIdPrefix: com.bradygaster
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5"

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Debug.xcconfig

targets:
  FrogR:
    type: application
    platform: iOS
    sources:
      - FrogR
    settings:
      base:
        INFOPLIST_FILE: FrogR/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.bradygaster.frogr
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets:
        - FrogRTests

  FrogRTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - FrogRTests
    dependencies:
      - target: FrogR
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bradygaster.frogr.tests
